name: MEGA to Google Drive Transfer

on:
  schedule:
    - cron: '* * * * *'

  workflow_dispatch:

concurrency:
  group: mega-transfer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install megatools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y megatools -qq

      - name: Install mega.py
        run: pip install mega.py --break-system-packages -q

      - name: Install rclone
        run: curl -s https://rclone.org/install.sh | sudo bash

      - name: Run transfer
        env:
          MEGA_LINKS: ${{ secrets.MEGA_LINKS }}
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          GDRIVE_REMOTE: ${{ secrets.GDRIVE_REMOTE }}
          GDRIVE_FOLDER: ${{ secrets.GDRIVE_FOLDER }}
        run: python mega_to_gdrive.py

      - name: Save state to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add mega_transfer_state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]" && git push
