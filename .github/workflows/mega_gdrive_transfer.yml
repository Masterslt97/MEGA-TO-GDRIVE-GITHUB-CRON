name: MEGA to Google Drive Transfer

on:
  workflow_dispatch:

concurrency:
  group: mega-transfer-single
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install megatools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y megatools -qq

      - name: Install mega.py
        run: pip install mega.py --break-system-packages -q

      - name: Install rclone
        run: curl -s https://rclone.org/install.sh | sudo bash

      - name: Download artifact (completed list)
        uses: actions/download-artifact@v4
        with:
          name: completed-links
        continue-on-error: true

      - name: Run transfer
        env:
          MEGA_LINKS: ${{ secrets.MEGA_LINKS }}
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: python mega_to_gdrive.py

      - name: Upload artifact (completed list)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: completed-links
          path: completed_links.json
          retention-days: 90

      - name: Save state to repo (backup)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add completed_links.json
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "update state [skip ci]"
          git pull --rebase origin main || true
          git push

      - name: Auto-trigger next if files remain
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
import json
try:
    d = json.load(open('completed_links.json'))
except Exception:
    d = {'folders':{}}
rem = sum(f['total']-f['done'] for f in d.get('folders',{}).values() if f.get('status')!='completed')
if rem > 0:
    import subprocess
    r = subprocess.run(['gh','workflow','run','MEGA to Google Drive Transfer','--ref','main'], capture_output=True, text=True)
    print(f'Triggered next cycle (exit={r.returncode})' if r.returncode==0 else f'Trigger failed: {r.stderr.strip()}')
else:
    print('All done, no more cycles')
"


