name: MEGA to Google Drive Transfer

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install megatools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y megatools -qq

      - name: Install mega.py
        run: pip install mega.py --break-system-packages -q

      - name: Install rclone
        run: curl -s https://rclone.org/install.sh | sudo bash

      - name: Download artifact (completed list)
        uses: actions/download-artifact@v4
        with:
          name: completed-links
        continue-on-error: true

      - name: Run transfer
        env:
          MEGA_LINKS: ${{ secrets.MEGA_LINKS }}
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: python mega_to_gdrive.py

      - name: Upload artifact (completed list)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: completed-links
          path: completed_links.json
          retention-days: 90

      - name: Save state to repo (backup)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add completed_links.json
          git diff --staged --quiet || git commit -m "update state [skip ci]" && git push

      - name: Trigger next cycle
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next transfer cycle..."
          gh workflow run "MEGA to Google Drive Transfer" --ref main 2>&1 && echo "Next cycle triggered!" || echo "Trigger failed (cron will retry)"
